         aparece inmediatamente en la fuente fallback y se intercambia cuando
         la web font esta lista. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=PT+Serif:wght@400;700&family=Allura&display=swap"
    />

      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
